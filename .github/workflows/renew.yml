name: Aternos Auto Renew

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libxml2-dev libxslt1-dev python3-dev

      - name: Install Python dependencies
        run: pip install python-aternos

      - name: Renew Aternos server
        env:
          ATERNOS_USERNAME: ${{ secrets.ATERNOS_USERNAME }}
          ATERNOS_PASSWORD: ${{ secrets.ATERNOS_PASSWORD }}
        run: python3 renew.py
