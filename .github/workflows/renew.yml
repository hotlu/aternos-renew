name: Aternos Auto Renew

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libglib2.0-0 libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libgbm1 libasound2

      - name: Install Chrome
        run: |
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i google-chrome-stable_current_amd64.deb || sudo apt-get install -f -y

      - name: Install Python dependencies
        run: |
          pip install seleniumbase pyvirtualdisplay

      - name: Renew Aternos server
        env:
          ATERNOS_USERNAME: ${{ secrets.ATERNOS_USERNAME }}
          ATERNOS_PASSWORD: ${{ secrets.ATERNOS_PASSWORD }}
        run: python3 renew.py
